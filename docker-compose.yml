version: "3.9"

services:

  app:
    build: .
    container_name: vigilant-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - vigilant-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: vigilant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - vigilant-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: vigilant-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vigilant123
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - vigilant-net
    restart: unless-stopped

networks:
  vigilant-net:
    driver: bridge