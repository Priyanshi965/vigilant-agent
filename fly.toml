# Fly.io configuration — Vigilant Agent
# Free tier: 3 shared-cpu-1x VMs with 256 MB RAM + 3 GB storage
# Change the app name below to something unique (fly.io names are global)

app = "vigilant-agent"
primary_region = "ord"   # Chicago — closest free-tier region to most users

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port     = 8000
  force_https       = true
  auto_stop_machines  = false   # keeps the machine alive 24/7 (no cold starts)
  auto_start_machines = true
  min_machines_running = 1

# ── Machine size (free tier) ──────────────────────────────────────────────────
[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256

# ── Persistent volume for SQLite ──────────────────────────────────────────────
# Mount at /data — entrypoint.sh symlinks /app/vigilant.db → /data/vigilant.db
# Create the volume with: fly volumes create vigilant_data --size 1
[[mounts]]
  source      = "vigilant_data"
  destination = "/data"

# ── Health check ─────────────────────────────────────────────────────────────
[[services.http_checks]]
  interval      = "15s"
  timeout       = "10s"
  grace_period  = "30s"
  method        = "GET"
  path          = "/ping"
